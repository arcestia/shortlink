name: Mirror to Tangled
on: [push, delete]

jobs:
  codeberg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: git@tangled.org:skiddle.blue/shortlink
          ssh_private_key: ${{ secrets.TANGLED_SSH }}
